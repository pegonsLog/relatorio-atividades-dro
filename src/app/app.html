<!-- Layout Principal do Sistema de Relatório DRO -->
<nav class="navbar-modern">
  <div class="navbar-content">
    <div class="navbar-brand">
      <div class="brand-logo">
        <img src="assets/logo/BHTrans.png" alt="BHTRANS" />
      </div>
      <span class="brand-text">{{ title() }}</span>
    </div>
  </div>
</nav>

<!-- Aviso de nova versão disponível -->
<div class="update-banner" *ngIf="atualizacaoDisponivel()">
  <div class="update-banner-content">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
      class="update-banner-icon">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M16.023 9.348h4.992V4.356M2.985 19.644v-4.992h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
    </svg>
    <span class="update-banner-text">Uma nova versão do aplicativo está disponível.</span>
    <button type="button" class="update-banner-btn" (click)="aplicarAtualizacao()" [disabled]="aplicandoAtualizacao()">
      {{ aplicandoAtualizacao() ? 'Atualizando...' : 'Atualizar agora' }}
    </button>
  </div>
</div>

<main class="main-content">
  <router-outlet></router-outlet>
</main>
